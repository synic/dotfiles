---
version: 3
final_space: true

palette:
  black: "#262B44"
  blue: "#4B95E9"
  green: "#59C9A5"
  orange: "#F07623"
  red: "#D81E5B"
  white: "#E0DEF4"
  yellow: "#F3AE35"

blocks:
  - type: prompt
    alignment: left
    newline: true
    segments:
      - type: path
        style: plain
        background: transparent
        foreground: p:blue
        template: "{{ .Path }} "
        properties:
          style: full

      - type: git
        style: plain
        foreground: p:grey
        background: transparent
        templates:
          - "\uE0A0({{ .HEAD }}"
          - "{{ if or (gt .Behind 0) (gt .Ahead 0) (.Working.Changed) (.Staging.Changed) }} [{{end}}"  # yamllint disable-line
          - "{{ if or (.Working.Changed) (.Staging.Changed) }}<yellow>*</>{{ end }}"  # yamllint disable-line
          - "<cyan>{{ if gt .Behind 0 }}⇣{{ end }}{{ if gt .Ahead 0 }}⇡{{ end }}</>"  # yamllint disable-line
          - "{{ if or (gt .Behind 0) (gt .Ahead 0) (.Working.Changed) (.Staging.Changed) }}]{{end}}"  # yamllint disable-line
          - "{{ if or (gt .Behind 0) (gt .Ahead 0) (.Working.Changed) (.Staging.Changed) }}){{end}} "  # yamllint disable-line
        properties:
          branch_icon: ""
          commit_icon: "@"
          fetch_status: true

      - type: status
        style: plain
        foreground: "p:blue"
        foreground_templates:
          - "{{ if .Error }}p:yellow{{ end }}"
        trailing_diamond: 
        template: "{{ if .Error }}[{{ reason .Code }}]!{{ end }}{{ if not .Error }}${{ end }}"  # yamllint disable-line
        properties:
          always_enabled: true

  - type: rprompt
    overflow: hidden
    segments:
      - type: executiontime
        style: plain
        foreground: yellow
        background: transparent
        template: "{{ .FormattedMs }}"
        properties:
          threshold: 1

  - type: prompt
    alignment: left
    newline: true
    segments:
      - type: text
        style: plain
        foreground_templates:
          - "{{if gt .Code 0}}red{{end}}"
          - "{{if eq .Code 0}}magenta{{end}}"
        background: transparent
        template: "❯"

transient_prompt:
  foreground_templates:
    - "{{if gt .Code 0}}red{{end}}"
    - "{{if eq .Code 0}}magenta{{end}}"
  background: transparent
  template: "❯ "
  newline: true

secondary_prompt:
  foreground: magenta
  background: transparent
  template: "❯❯ "
